<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5a6b7b"/>
    </marker>
    <style>
      .box{fill:#fff;stroke:#232f3e;stroke-width:1.5;rx:8;}
      .svc{fill:#fff7ef;stroke:#ec7211;stroke-width:1.5;}
      .grp{fill:none;stroke:#c9d1d8;stroke-width:1.2;stroke-dasharray:4 3;}
      .t{fill:#232f3e;}
      .tc{fill:#232f3e;text-anchor:middle;}
      .sub{fill:#687078;font-size:11px;text-anchor:middle;}
      .lbl{fill:#5a6b7b;font-size:11px;}
      .ln{stroke:#5a6b7b;stroke-width:1.6;fill:none;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="460" fill="#f4f5f6"/>
  <text x="24" y="30" class="t" font-size="18" font-weight="700">AI Product Designer Agent — Architecture</text>
  <text x="24" y="50" class="lbl">Region: us-west-2 · Serverless · Docker-free</text>

  <!-- Browser -->
  <rect class="box" x="24" y="120" width="120" height="60" rx="8"/>
  <text x="84" y="148" class="tc" font-weight="600">Browser</text>
  <text x="84" y="166" class="sub">user</text>

  <!-- Web delivery group -->
  <rect class="grp" x="180" y="90" width="200" height="120" rx="10"/>
  <text x="280" y="108" class="sub" font-weight="600">Static web app</text>
  <rect class="svc" x="196" y="120" width="76" height="60" rx="8"/>
  <text x="234" y="146" class="tc" font-size="12">Cloud-</text>
  <text x="234" y="162" class="tc" font-size="12">Front</text>
  <rect class="svc" x="288" y="120" width="76" height="60" rx="8"/>
  <text x="326" y="154" class="tc" font-size="12">S3 (SPA)</text>

  <!-- API + Lambda -->
  <rect class="svc" x="420" y="120" width="90" height="60" rx="8"/>
  <text x="465" y="146" class="tc" font-size="12">API</text>
  <text x="465" y="162" class="tc" font-size="12">Gateway</text>

  <rect class="svc" x="546" y="120" width="100" height="60" rx="8"/>
  <text x="596" y="146" class="tc" font-size="12">Lambda</text>
  <text x="596" y="162" class="sub">invoke_agent</text>

  <!-- Bedrock Agent -->
  <rect class="box" x="690" y="108" width="230" height="84" rx="10" fill="#fff" stroke="#ec7211" stroke-width="2"/>
  <text x="805" y="132" class="tc" font-weight="700">Amazon Bedrock Agent</text>
  <text x="805" y="152" class="sub">"Product Designer"</text>
  <text x="805" y="172" class="sub">Anthropic Claude (reasoning)</text>

  <!-- Action group lambda -->
  <rect class="svc" x="690" y="250" width="100" height="60" rx="8"/>
  <text x="740" y="276" class="tc" font-size="12">Lambda</text>
  <text x="740" y="292" class="sub">generate_image</text>

  <!-- Stability -->
  <rect class="svc" x="820" y="250" width="100" height="60" rx="8"/>
  <text x="870" y="272" class="tc" font-size="12">Stability</text>
  <text x="870" y="288" class="tc" font-size="12">Stable Image</text>

  <!-- Images storage -->
  <rect class="grp" x="546" y="350" width="374" height="86" rx="10"/>
  <text x="733" y="368" class="sub" font-weight="600">Generated images</text>
  <rect class="svc" x="690" y="378" width="100" height="48" rx="8"/>
  <text x="740" y="406" class="tc" font-size="12">S3 (images)</text>
  <rect class="svc" x="820" y="378" width="100" height="48" rx="8"/>
  <text x="870" y="400" class="tc" font-size="12">Cloud-</text>
  <text x="870" y="416" class="tc" font-size="12">Front</text>

  <!-- arrows -->
  <!-- browser -> webcdn -->
  <path class="ln" d="M144,140 L196,140" marker-end="url(#arrow)"/>
  <path class="ln" d="M272,150 L288,150" marker-end="url(#arrow)"/>
  <!-- browser -> api (curved) -->
  <path class="ln" d="M120,180 C120,230 460,230 465,182" marker-end="url(#arrow)"/>
  <text x="250" y="245" class="lbl">POST /design (fetch)</text>
  <!-- api -> lambda -->
  <path class="ln" d="M510,150 L546,150" marker-end="url(#arrow)"/>
  <!-- lambda -> agent -->
  <path class="ln" d="M646,150 L690,150" marker-end="url(#arrow)"/>
  <text x="650" y="142" class="lbl">InvokeAgent</text>
  <!-- agent -> action lambda -->
  <path class="ln" d="M760,192 L745,250" marker-end="url(#arrow)"/>
  <text x="762" y="226" class="lbl">action group</text>
  <!-- action lambda -> stability -->
  <path class="ln" d="M790,280 L820,280" marker-end="url(#arrow)"/>
  <!-- action lambda -> s3 images -->
  <path class="ln" d="M740,310 L740,378" marker-end="url(#arrow)"/>
  <text x="746" y="346" class="lbl">put PNG</text>
  <!-- s3 images -> cloudfront images -->
  <path class="ln" d="M790,402 L820,402" marker-end="url(#arrow)"/>
  <!-- cloudfront images -> agent (URL returned) dashed back -->
  <path class="ln" d="M920,402 C946,402 946,150 920,150" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="930" y="280" class="lbl" transform="rotate(90 930 280)">image URL</text>
</svg>
